name: Update WagerHub Data

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 17 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install requests pandas

      - name: Run pipeline
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: python pipeline.py

      - name: Commit updated data
        run: |
          git config user.name  "WagerHub Bot"
          git config user.email "wagerhub-bot@users.noreply.github.com"
          git add outputs/today.json outputs/history/
          git diff --cached --quiet || git commit -m "Data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
